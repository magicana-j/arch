<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!--
    Japanese font priority configuration
    User: ~/.config/fontconfig/conf.d/49-jp-font-priority.conf

    Font assignments:
      serif      -> IPAex Mincho   (明朝体)
      sans-serif -> IPAex Gothic   (ゴシック体)
      monospace  -> JetBrains Mono (ASCII/Latin), fallback: IPAex Gothic (CJK)

    Monospace strategy:
      JetBrains Mono covers ASCII and Latin glyphs excellently but has no
      CJK coverage. When a terminal or editor renders Japanese text in a
      monospace context, fontconfig will fall through to IPAex Gothic for
      any codepoint JetBrains Mono cannot supply. This gives clean Latin
      rendering in code while keeping readable Japanese glyphs.
  -->

  <!-- ===================================================================
       1. Explicit lang=ja match: prepend IPAex to serif / sans-serif.
          For monospace with lang=ja, prepend JetBrains Mono first (Latin
          coverage), then IPAex Gothic (Japanese coverage).
       =================================================================== -->

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family" compare="eq">
      <string>serif</string>
    </test>
    <edit name="family" mode="prepend">
      <string>IPAex Mincho</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family" compare="eq">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="prepend">
      <string>IPAex Gothic</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <!-- IPAex Gothic appended first so JetBrains Mono (prepended below)
         ends up at position 0 in the final list. -->
    <edit name="family" mode="append">
      <string>IPAex Gothic</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <edit name="family" mode="prepend">
      <string>JetBrains Mono</string>
    </edit>
  </match>

  <!-- ===================================================================
       2. Generic alias: map serif / sans-serif / monospace globally.
          Applies when no explicit lang tag is present (locale-driven).
       =================================================================== -->

  <alias>
    <family>serif</family>
    <prefer>
      <family>IPAex Mincho</family>
    </prefer>
  </alias>

  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>IPAex Gothic</family>
    </prefer>
  </alias>

  <!-- monospace: JetBrains Mono for Latin/ASCII, IPAex Gothic for CJK fallback -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrains Mono</family>
      <family>IPAex Gothic</family>
    </prefer>
  </alias>

  <!-- ===================================================================
       3. Block CJK fallback fonts from substituting Japanese glyphs.
          wqy-zenhei uses Simplified Chinese (GB) glyph conventions;
          HAN NOM A uses Vietnamese conventions. Both differ from JIS.
          Excluded only when lang=ja is active.
       =================================================================== -->

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family" compare="eq">
      <string>WenQuanYi Zen Hei</string>
    </test>
    <edit name="family" mode="delete">
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family" compare="eq">
      <string>HAN NOM A</string>
    </test>
    <edit name="family" mode="delete">
    </edit>
  </match>

</fontconfig>
